apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-db-assistant
  labels:
    app: ai-db-assistant
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-db-assistant
  template:
    metadata:
      labels:
        app: ai-db-assistant
    spec:
      containers:
      - name: ai-db-assistant
        image: ai-db-assistant:latest
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "aidb"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: anthropic-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-db-assistant-service
spec:
  selector:
    app: ai-db-assistant
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
